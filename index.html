<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pauta Ágil - Gestão Escolar</title>
    <style>
        /* Mantenho o seu visual profissional azul */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #0f172a, #1e3a8a); color: #fff; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card { background: rgba(255,255,255,0.1); padding: 50px 40px; border-radius: 24px; text-align: center; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .hidden { display: none !important; }
        button { padding: 15px 25px; border-radius: 12px; border: none; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; transition: 0.3s; }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        #mainApp { display: none; width: 100%; max-width: 1100px; padding: 20px; }
    </style>
</head>
<body>

    <div id="loginScreen" class="card">
        <h1>🚀 Pauta Ágil</h1>
        <p id="statusMsg">Para evitar conflitos de contas, use o botão abaixo para entrar:</p>
        
        <button onclick="loginOficial()">Acessar com Google</button>

        <div id="buySection" class="hidden">
            <p style="color: #fda4af; font-weight: bold; margin-top: 20px;">Acesso não autorizado.</p>
            <a href="https://mpago.la/25RuJm4" target="_blank" style="text-decoration:none;"><button style="background: #10b981;">Assinar Licença</button></a>
        </div>
    </div>

    <div id="mainApp">
        <h1>🚀 Painel Pauta Ágil</h1>
        <div id="schools"></div>
    </div>

<script>
    // SEU LINK DE IMPLANTAÇÃO
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnfAoc76JnMWV0ANB_98sKOlaw-s4AVc6UD6SK0ctuD_XZsRlHWISVsQTmhUKdF4lwMg/exec';

    function loginOficial() {
        // Isso força o Google a mostrar a tela de seleção de conta, mesmo em janela normal
        window.location.href = SCRIPT_URL + "?run=1&prompt=select_account";
    }

    async function carregarDados() {
        try {
            // Tenta buscar os dados com um "carimbo" de tempo para evitar cache antigo
            const timestamp = new Date().getTime();
            const response = await fetch(`${SCRIPT_URL}?run=1&cb=${timestamp}`);
            const data = await response.json();

            if (data.error) {
                document.getElementById('statusMsg').innerHTML = `Logado como: <b>${data.email}</b>`;
                document.getElementById('buySection').classList.remove('hidden');
            } else if (Array.isArray(data)) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                // Aqui entraria sua função render(data);
            }
        } catch (e) {
            console.log("Aguardando login oficial.");
        }
    }

    // Verifica se o usuário já voltou do login
    carregarDados();
</script>
</body>
</html>
