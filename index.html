<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pauta Ágil - Gestão Escolar</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #0f172a, #1e3a8a); color: #fff; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .card { background: rgba(255,255,255,0.1); padding: 50px 40px; border-radius: 24px; text-align: center; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); width: 90%; max-width: 400px; margin-top: 100px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        #mainApp { width: 100%; max-width: 1100px; padding: 20px; box-sizing: border-box; display: none; }
        .hidden { display: none !important; }
        .section { background: rgba(255, 255, 255, .08); border-radius: 12px; margin-bottom: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .school-header { background: rgba(37, 99, 235, 0.4); padding: 15px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 12px 24px; border-radius: 10px; border: none; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; margin: 5px; }
        table { border-collapse: collapse; width: 100%; margin-top: 10px; background: #fff; color: #000; border-radius: 12px; overflow: hidden; }
        th, td { border: 1px solid #e2e8f0; text-align: center; padding: 8px; }
    </style>
</head>
<body>

    <div id="loginScreen" class="card">
        <h1>🚀 Pauta Ágil</h1>
        <p id="loginMsg">Clique abaixo para liberar o acesso à sua conta escolar:</p>
        
        <button onclick="fazerLogin()">Liberar Acesso Google</button>
        
        <div id="checkArea" class="hidden" style="margin-top:20px;">
            <p>Após autorizar na outra aba, clique aqui:</p>
            <button onclick="checkAccess()" style="background: #10b981;">Já autorizei, entrar no sistema</button>
        </div>

        <div id="buySection" class="hidden">
            <p style="color: #fda4af; font-weight: bold; margin-top: 20px;">Acesso não localizado.</p>
            <a href="https://mpago.la/25RuJm4" target="_blank"><button style="background: #10b981; width: 100%;">Assinar Agora</button></a>
        </div>
    </div>

    <div id="mainApp">
        <h1>🚀 Painel Pauta Ágil</h1>
        <div style="text-align: center; margin-bottom: 25px;">
            <input id="schoolInput" placeholder="🏫 Nome da Escola" style="padding: 10px; border-radius: 8px; border: none;">
            <button onclick="addSchool()">➕ Unidade</button>
            <button onclick="save()" style="background: #10b981;">☁️ Sincronizar</button>
            <div id="syncStatus" style="font-weight: bold; margin-top: 10px;"></div>
        </div>
        <div id="schools"></div>
    </div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwnfAoc76JnMWV0ANB_98sKOlaw-s4AVc6UD6SK0ctuD_XZsRlHWISVsQTmhUKdF4lwMg/exec?run=1';
    
    let schools = [];

    function fazerLogin() {
        // Abre a autenticação do Google em uma aba separada
        window.open(WEB_APP_URL, '_blank');
        // Mostra o botão de confirmação no site principal
        document.getElementById('checkArea').classList.remove('hidden');
        document.getElementById('loginMsg').innerText = "Uma nova aba foi aberta para você autorizar o Google.";
    }

    async function checkAccess() {
        const status = document.getElementById('syncStatus');
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();

            if (data.error) {
                document.getElementById('checkArea').classList.add('hidden');
                document.getElementById('buySection').classList.remove('hidden');
            } else {
                schools = data;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').style.display = 'block';
                render();
            }
        } catch (e) {
            alert("Ainda não detectamos sua autorização. Verifique se você aceitou os termos na outra aba e clique novamente.");
        }
    }

    async function save() {
        const status = document.getElementById('syncStatus');
        status.innerText = "⏳ Sincronizando...";
        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ action: "save", content: schools })
            });
            status.innerText = "✅ Sincronizado!";
        } catch (e) { status.innerText = "❌ Erro na conexão."; }
    }

    function addSchool() {
        const n = document.getElementById('schoolInput').value;
        if (!n.trim()) return;
        schools.push({ name: n.trim(), classes: [] });
        render(); save();
    }

    function render() {
        const div = document.getElementById('schools');
        div.innerHTML = '';
        schools.forEach((school, s) => {
            const sDiv = document.createElement('div');
            sDiv.className = 'section';
            sDiv.innerHTML = `<div class="school-header"><h2>🏫 ${school.name}</h2></div>`;
            div.appendChild(sDiv);
        });
    }

    // Tenta carregar automaticamente se já estiver logado
    checkAccess();
</script>
</body>
</html>
