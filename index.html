<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Diário de Classe</title>

<style>
body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 10px; background: linear-gradient(135deg, #0f172a, #1e3a8a); color: #fff; margin: 0; min-height: 100vh; }
h1 { text-align: center; font-size: 1.8em; margin: 15px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
.section { background: rgba(255, 255, 255, .08); border-radius: 16px; margin-bottom: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
.table-container { overflow-x: auto; margin-top: 15px; border-radius: 12px; background: #fff; position: relative; }
table { border-collapse: separate; border-spacing: 0; width: 100%; background: #fff; color: #000; }

/* Células ultra compactas conforme solicitado */
th, td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 5px 2px; text-align: center; white-space: nowrap; min-width: 22px; font-size: 11px; }

th { background: #1e40af; color: #fff; font-weight: bold; }
.fixed-num { position: sticky; left: 0; z-index: 11; background: #f1f5f9; min-width: 30px; }
.fixed-name { position: sticky; left: 41px; z-index: 11; background: #fff; text-align: left; min-width: 150px; border-right: 3px solid #1e40af !important; padding-left: 8px !important; }
thead th.fixed-num, thead th.fixed-name { z-index: 30; background: #1e40af !important; }

.day-btn { display: inline-flex; align-items: center; justify-content: center; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 4px; width: 22px; height: 22px; font-weight: bold; cursor: pointer; color: #1e40af; font-size: 10px; }
.day-btn.has-note { background: #10b981 !important; color: #fff !important; }
button, .select-estilizado { padding: 8px 12px; border-radius: 10px; border: none; background: #3b82f6; color: #fff; font-weight: bold; cursor: pointer; margin: 4px; font-size: 12px; }
.falta-marcada { color: red !important; font-weight: bold; background: #fee2e2; }

.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, .7); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal-content { background: #fff; color: #000; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
.move-btn { background: none; color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 2px 6px; font-size: 12px; margin: 0 2px; border-radius: 4px; }
</style>
</head>

<body>

<h1>🚀 Meu Diário de Classe</h1>

<div style="text-align: center; margin-bottom: 10px;">
  <input id="schoolInput" placeholder="🏫 Nome da Escola" style="padding: 10px; border-radius: 8px; border: none; width: 180px;">
  <button onclick="addSchool()">➕ Escola</button>
  <button onclick="manualSave()" style="background: #10b981;">☁️ Sincronizar</button>
  <div id="syncStatus" style="font-size: 12px; margin-top: 5px; font-weight: bold;"></div>
</div>

<div id="schools"></div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin-top:0; color:#1e40af;">📝 Resumo da Aula</h3>
    <textarea id="noteText" placeholder="O que foi ensinado hoje?" style="width: 100%; height: 120px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; padding:10px; font-family: sans-serif; resize: none;"></textarea>
    <div style="display: flex; gap: 10px;">
        <button onclick="closeModal()" style="background:#ef4444; flex:1;">Cancelar</button>
        <button onclick="saveNote()" style="background:#10b981; flex:1;">Salvar Registro</button>
    </div>
  </div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxNzAf7pMLME8f_uDNBRIznFnxvOqHSiOgGbOYKMMDdZ7M662iFP5Iq4QalJSsJG19IdA/exec';
const BACKUP_KEY = 'diario_pro_backup';

let schools = [];
let openState = {};
let currentNote = {};

async function save() {
  localStorage.setItem(BACKUP_KEY, JSON.stringify(schools));
  try {
    await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "save", content: schools }) });
    document.getElementById('syncStatus').innerText = "✅ Sincronizado";
  } catch(e) { document.getElementById('syncStatus').innerText = "⚠️ Offline"; }
}

function manualSave() { save(); alert("✔️ Dados salvos!"); }

async function load() {
  try {
    const response = await fetch(WEB_APP_URL);
    const data = await response.json();
    if (Array.isArray(data)) schools = data;
  } catch(e) {
    const d = localStorage.getItem(BACKUP_KEY);
    if (d) schools = JSON.parse(d);
  }
  render();
}

function editClassName(s, c) {
    const n = prompt("Novo nome da turma:", schools[s].classes[c].name);
    if (n) { schools[s].classes[c].name = n.trim(); render(); save(); }
}

function moveClass(s, c, dir) {
    const arr = schools[s].classes;
    const target = c + dir;
    if (target >= 0 && target < arr.length) {
        [arr[c], arr[target]] = [arr[target], arr[c]];
        render(); save();
    }
}

function addSchool() {
  const n = document.getElementById('schoolInput').value;
  if (!n.trim()) return;
  schools.push({ name: n.trim(), classes: [] });
  document.getElementById('schoolInput').value = '';
  render(); save();
}

function addClass(s) {
  const n = prompt('Nome da turma:');
  if (n) { schools[s].classes.push({ name: n, students: [], subjects: [], notes: {}, month: new Date().getMonth(), year: 2026 }); render(); save(); }
}

function addStudents(s, c) {
  const input = prompt('Lista de alunos:');
  if (input) {
    input.split(/\n/).forEach(n => { if(n.trim()) schools[s].classes[c].students.push({ name: n.trim(), absences: {}, grades: {}, transferido: false }); });
    render(); save();
  }
}

function addSubject(s, c) {
  const n = prompt('Disciplina:');
  if (n) { schools[s].classes[c].subjects.push(n); render(); save(); }
}

function openModal(s, c, d) {
  const cls = schools[s].classes[c];
  currentNote = { s, c, d };
  const noteKey = `m${cls.month}_d${d}`;
  
  let notaValida = cls.notes[noteKey]?.text;
  if (!notaValida && cls.month === 3) {
      notaValida = cls.notes[d]?.text;
  }
  
  document.getElementById('noteText').value = notaValida || '';
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function saveNote() {
  const { s, c, d } = currentNote;
  const cls = schools[s].classes[c];
  const texto = document.getElementById('noteText').value.trim();
  const noteKey = `m${cls.month}_d${d}`;
  if(!cls.notes) cls.notes = {};
  if (texto === "") {
    delete cls.notes[noteKey];
    if (cls.month === 3) delete cls.notes[d]; 
  } else {
    cls.notes[noteKey] = { text: texto };
  }
  closeModal(); render(); save();
}

function exportFullReport(s, c) {
  const school = schools[s];
  const cls = school.classes[c];
  const m = cls.month;
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  let html = `<html><head><title>Relatório</title><style>body{font-family:sans-serif;padding:20px;} table{width:100%;border-collapse:collapse;} th,td{border:1px solid #ccc;padding:8px;text-align:center;} .btn-voltar{background:#1e40af;color:white;padding:10px;border-radius:5px;border:none;cursor:pointer;margin-bottom:15px;}</style></head><body>
  <button class="btn-voltar" onclick="window.close()">← Voltar ao App</button>
  <h2>${school.name} - ${cls.name}</h2><p>Mês: ${meses[m]}</p>
  <table><thead><tr><th>Nº</th><th>Aluno</th><th>Faltas Totais (Dias)</th></tr></thead><tbody>`;
  
  cls.students.forEach((st, i) => {
      let diasComFalta = [];
      if (st.absences[m]) {
          Object.keys(st.absences[m]).forEach(dia => {
              if (st.absences[m][dia]) diasComFalta.push(dia.padStart(2, '0'));
          });
      }
      diasComFalta.sort((a, b) => a - b);
      let total = diasComFalta.length;
      let resumoFaltas = total > 0 ? `<b>${total}</b><br><small>Dias: ${diasComFalta.join(', ')}</small>` : '0';

      html += `<tr><td>${i+1}</td><td>${st.name}</td><td>${resumoFaltas}</td></tr>`;
  });
  
  html += `</tbody></table><h4>📝 Notas de Aula:</h4>`;
  Object.keys(cls.notes || {}).sort().forEach(k => { 
      if(k.startsWith(`m${m}_`)) html += `<p><b>Dia ${k.split('_d')[1]}:</b> ${cls.notes[k].text}</p>`;
      else if(!isNaN(k) && m == 3) html += `<p><b>Dia ${k} (Abril):</b> ${cls.notes[k].text}</p>`;
  });
  html += `</body></html>`;
  const w = window.open(); w.document.write(html); w.document.close();
}

function toggleAbsence(element, s, c, i, d) {
  const cls = schools[s].classes[c];
  const st = cls.students[i];
  if(!st.absences[cls.month]) st.absences[cls.month] = {};
  st.absences[cls.month][d] = !st.absences[cls.month][d];
  element.innerText = st.absences[cls.month][d] ? "F" : "";
  element.className = st.absences[cls.month][d] ? "falta-marcada" : "";
  save();
}

function render() {
  const div = document.getElementById('schools');
  div.innerHTML = '';
  const mesVigente = new Date().getMonth();

  schools.forEach((school, s) => {
    const sKey = `school-${s}`;
    let sHtml = `<div class='section'><div style="cursor:pointer; display:flex; justify-content:space-between;" onclick="openState['${sKey}']=!openState['${sKey}'];render()"><b>🏫 ${school.name}</b><span>${openState[sKey]?'🔽':'▶️'}</span></div>`;
    if(openState[sKey]) {
      sHtml += `<button onclick="addClass(${s})">➕ Turma</button>`;
      school.classes.forEach((cls, c) => {
        const cKey = `${s}-${c}`;
        // Força o mês atual se não houver um definido
        if (cls.month === undefined) cls.month = mesVigente;

        sHtml += `<div style="margin-top:10px; background:rgba(255,255,255,0.1); padding:10px; border-radius:8px;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span><button class="move-btn" onclick="moveClass(${s},${c},-1)">🔼</button><button class="move-btn" onclick="moveClass(${s},${c},1)">🔽</button><b onclick="editClassName(${s},${c})" style="cursor:pointer; text-decoration:underline;">📚 ${cls.name}</b></span>
            <span style="cursor:pointer" onclick="openState['${cKey}']=!openState['${cKey}'];render()">${openState[cKey]?'🔽':'▶️'}</span>
          </div>`;
        if(openState[cKey]) {
          sHtml += `<div><button onclick="addSubject(${s},${c})" style="background:#8b5cf6">➕ Disciplina</button><button onclick="addStudents(${s},${c})" style="background:#0ea5e9">👥 Alunos</button><button onclick="exportFullReport(${s},${c})" style="background:#f59e0b">📊 Imprimir</button>
          <select class="select-estilizado" onchange="schools[${s}].classes[${c}].month=Number(this.value);render();save();">`;
          const mesesSimples = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
          mesesSimples.forEach((mLabel, idx) => sHtml += `<option value="${idx}" ${idx==cls.month?'selected':''}>${mLabel}</option>`);
          sHtml += `</select></div>`;
          const days = new Date(2026, cls.month + 1, 0).getDate();
          sHtml += `<div class='table-container'><table><thead><tr><th class="fixed-num">Nº</th><th class="fixed-name">Alunos</th><th colspan="${days}">Chamada</th></tr><tr><th class="fixed-num"></th><th class="fixed-name"></th>`;
          for(let d=1; d<=days; d++) {
            const noteKey = `m${cls.month}_d${d}`;
            const hasNote = (cls.notes?.[noteKey] || (cls.month === 3 && cls.notes?.[d])) ? 'has-note' : '';
            sHtml += `<th><span onclick="openModal(${s},${c},${d})" class="day-btn ${hasNote}">${d}</span></th>`;
          }
          sHtml += `</tr></thead><tbody>`;
          cls.students.forEach((st, i) => {
            sHtml += `<tr><td class="fixed-num">${i+1}</td><td class="fixed-name"><b>${st.name}</b></td>`;
            for(let d=1; d<=days; d++) {
              const f = st.absences[cls.month]?.[d];
              sHtml += `<td ondblclick="toggleAbsence(this, ${s}, ${c}, ${i}, ${d})" class="${f?'falta-marcada':''}" style="cursor:pointer; user-select:none;">${f?'F':''}</td>`;
            }
            sHtml += `</tr>`;
          });
          sHtml += `</tbody></table></div>`;
        }
        sHtml += `</div>`;
      });
    }
    div.innerHTML += sHtml + `</div>`;
  });
}
load();
</script>
</body>
</html>
