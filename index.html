<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Diário de Classe</title>
<style>
body { font-family: 'Segoe UI', sans-serif; padding: 10px; background: linear-gradient(135deg, #0f172a, #1e3a8a); color: #fff; margin: 0; min-height: 100vh; }
.section { background: rgba(255, 255, 255, .08); border-radius: 16px; margin-bottom: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
.table-container { overflow-x: auto; margin-top: 15px; border-radius: 12px; background: #fff; position: relative; }
table { border-collapse: separate; border-spacing: 0; width: 100%; background: #fff; color: #000; }
th, td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 10px; text-align: center; white-space: nowrap; }
th { background: #1e40af; color: #fff; font-size: 11px; font-weight: bold; }
.fixed-num { position: sticky; left: 0; z-index: 11; background: #f1f5f9; min-width: 40px; }
.fixed-name { position: sticky; left: 41px; z-index: 11; background: #fff; text-align: left; min-width: 180px; border-right: 3px solid #1e40af !important; }
button, .select-estilizado { padding: 10px 15px; border-radius: 10px; border: none; background: #3b82f6; color: #fff; font-weight: bold; cursor: pointer; margin: 4px; font-size: 13px; }
.falta-marcada { color: red !important; font-weight: bold; }
.move-btn { background: none; color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 2px 8px; font-size: 14px; margin: 0 2px; }
</style>
</head>
<body>

<h1>🚀 Meu Diário de Classe</h1>

<div style="text-align: center; margin-bottom: 10px;">
  <button onclick="manualSave()" style="background: #10b981;">☁️ Sincronizar Agora</button>
  <div id="syncStatus" style="font-size: 12px; margin-top: 5px; font-weight: bold;"></div>
</div>

<div id="schools"></div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxNzAf7pMLME8f_uDNBRIznFnxvOqHSiOgGbOYKMMDdZ7M662iFP5Iq4QalJSsJG19IdA/exec';
const BACKUP_KEY = 'diario_pro_backup';
let schools = [];
let openState = {};

async function save() {
  localStorage.setItem(BACKUP_KEY, JSON.stringify(schools));
  try {
    await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "save", content: schools }) });
    document.getElementById('syncStatus').innerText = "✅ Sincronizado";
  } catch(e) { document.getElementById('syncStatus').innerText = "⚠️ Offline"; }
}

function manualSave() { save(); alert("Dados salvos com sucesso!"); }

async function load() {
  try {
    const response = await fetch(WEB_APP_URL);
    const data = await response.json();
    if (Array.isArray(data)) schools = data;
  } catch(e) {
    const d = localStorage.getItem(BACKUP_KEY);
    if (d) schools = JSON.parse(d);
  }
  render();
}

function editClassName(s, c) {
    const n = prompt("Novo nome da turma:", schools[s].classes[c].name);
    if (n) { schools[s].classes[c].name = n; render(); save(); }
}

function moveClass(s, c, dir) {
    const arr = schools[s].classes;
    const target = c + dir;
    if (target >= 0 && target < arr.length) {
        [arr[c], arr[target]] = [arr[target], arr[c]];
        render(); save();
    }
}

function addSubject(s, c) {
  const n = prompt('Nome da Disciplina:');
  if (n) { schools[s].classes[c].subjects.push(n); render(); save(); }
}

function addStudents(s, c) {
  const n = prompt('Cole aqui a lista de nomes:');
  if (n) {
    n.split('\n').forEach(nome => { if(nome.trim()) schools[s].classes[c].students.push({name: nome.trim(), absences: {}, grades: {}}); });
    render(); save();
  }
}

function toggleF(element, s, c, i, d) {
  const cls = schools[s].classes[c];
  const st = cls.students[i];
  if(!st.absences[cls.month]) st.absences[cls.month] = {};
  st.absences[cls.month][d] = !st.absences[cls.month][d];
  element.innerText = st.absences[cls.month][d] ? "F" : "";
  element.className = st.absences[cls.month][d] ? "falta-marcada" : "";
  save();
}

function render() {
  const div = document.getElementById('schools');
  div.innerHTML = '';
  schools.forEach((school, s) => {
    const sKey = `s-${s}`;
    let sHtml = `<div class='section'><b style="cursor:pointer" onclick="openState['${sKey}']=!openState['${sKey}'];render()">🏫 ${school.name}</b>`;
    if(openState[sKey]) {
      school.classes.forEach((cls, c) => {
        const cKey = `${s}-${c}`;
        sHtml += `<div style="margin-top:10px; background:rgba(255,255,255,0.1); padding:15px; border-radius:10px;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>
                <button class="move-btn" onclick="moveClass(${s},${c},-1)">🔼</button>
                <button class="move-btn" onclick="moveClass(${s},${c},1)">🔽</button>
                <b onclick="editClassName(${s},${c})" style="cursor:pointer; text-decoration:underline;">📚 ${cls.name}</b>
            </span>
            <span style="cursor:pointer" onclick="openState['${cKey}']=!openState['${cKey}'];render()">${openState[cKey]?'🔽':'▶️'}</span>
          </div>`;
        if(openState[cKey]) {
          sHtml += `<div style="margin-top:10px">
                    <button onclick="addSubject(${s},${c})" style="background:#8b5cf6">➕ Disciplina</button>
                    <button onclick="addStudents(${s},${c})" style="background:#0ea5e9">👥 Alunos</button>
                    <button onclick="alert('Relatório gerado na planilha')" style="background:#f59e0b">📊 Imprimir</button>
                    <select class="select-estilizado" onchange="schools[${s}].classes[${c}].month=Number(this.value);render();save();">`;
          ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"].forEach((m, idx) => sHtml += `<option value="${idx}" ${idx==cls.month?'selected':''}>${m}</option>`);
          sHtml += `</select></div>`;
          const days = new Date(2026, cls.month + 1, 0).getDate();
          sHtml += `<div class='table-container'><table><thead><tr><th class="fixed-num">Nº</th><th class="fixed-name">Alunos</th><th colspan="${days}">Chamada</th></tr><tr><th class="fixed-num"></th><th class="fixed-name"></th>`;
          for(let d=1; d<=days; d++) sHtml += `<th>${d}</th>`;
          sHtml += `</tr></thead><tbody>`;
          cls.students.forEach((st, i) => {
            sHtml += `<tr><td class="fixed-num">${i+1}</td><td class="fixed-name"><b>${st.name}</b></td>`;
            for(let d=1; d<=days; d++) {
              const f = st.absences[cls.month]?.[d];
              sHtml += `<td ondblclick="toggleF(this, ${s}, ${c}, ${i}, ${d})" class="${f?'falta-marcada':''}">${f?'F':''}</td>`;
            }
            sHtml += `</tr>`;
          });
          sHtml += `</tbody></table></div>`;
        }
        sHtml += `</div>`;
      });
    }
    div.innerHTML += sHtml + `</div>`;
  });
}
load();
</script>
</body>
</html>
