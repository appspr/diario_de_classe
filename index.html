<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pauta Ágil - Gestão Escolar</title>

<style>
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  padding: 10px;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: #fff;
  margin: 0;
  min-height: 100vh;
}

h1 { text-align: center; font-size: 1.8em; margin: 15px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

.section {
  background: rgba(255, 255, 255, .08);
  border-radius: 16px;
  margin-bottom: 15px;
  padding: 15px;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

/* --- TABELA E COLUNA FIXA --- */
.table-container {
  overflow-x: auto;
  margin-top: 15px;
  border-radius: 12px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

table {
  border-collapse: separate;
  border-spacing: 0;
  width: 100%;
  background: #fff;
  color: #000;
}

th, td {
  border-right: 1px solid #e2e8f0;
  border-bottom: 1px solid #e2e8f0;
  padding: 8px;
  text-align: center;
  white-space: nowrap;
  vertical-align: middle;
}

th { background: #1e40af; color: #fff; font-size: 12px; }

th:nth-child(1), td:nth-child(1) {
  position: sticky; left: 0; z-index: 10;
  background: #f1f5f9; min-width: 35px;
}
th:nth-child(2), td:nth-child(2) {
  position: sticky; left: 44px; z-index: 10;
  background: #fff; text-align: left; min-width: 150px;
  border-right: 2px solid #1e40af;
}
th:nth-child(1), th:nth-child(2) {
  background: #1e40af !important; color: white; z-index: 11;
}

/* --- ESTILO TRANSFERIDO --- */
.transferido { background-color: #f1f5f9 !important; color: #94a3b8 !important; opacity: 0.7; }
.transferido b { text-decoration: line-through; }

/* --- BOTÕES E SELECT --- */
button, .select-estilizado {
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  margin: 4px;
  font-family: inherit;
  font-size: 14px;
  transition: 0.2s;
}
button:hover { background: #2563eb; }

.day-btn {
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.05); border-radius: 6px;
  width: 25px; height: 25px; font-weight: bold; cursor: pointer;
}
.day-btn.has-note { background: #10b981; color: #fff; border: 1px solid #059669; }

.modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, .7);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.modal-content {
  background: #fff; color: #000; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px;
}
</style>
</head>

<body>

<h1>🚀 Pauta Ágil</h1>

<div style="text-align: center; margin-bottom: 10px;">
  <input id="schoolInput" placeholder="🏫 Nome da Escola" style="padding: 10px; border-radius: 8px; border: none; width: 200px;">
  <button onclick="addSchool()">➕ Escola</button>
  <button onclick="manualSave()" style="background: #10b981;">☁️ Sincronizar</button>
  <div id="syncStatus" style="font-size: 12px; margin-top: 5px; font-weight: bold;"></div>
</div>

<div id="schools"></div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin-top:0; color:#1e40af;">📝 Resumo da Aula</h3>
    <textarea id="noteText" style="width: 100%; height: 120px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; padding:10px;"></textarea>
    <button onclick="saveNote()" style="background:#10b981; width: 100%;">Salvar Registro</button>
  </div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxNzAf7pMLME8f_uDNBRIznFnxvOqHSiOgGbOYKMMDdZ7M662iFP5Iq4QalJSsJG19IdA/exec';
const BACKUP_KEY = 'diario_pro_backup';

let schools = [];
let openState = {};
let currentNote = {};

async function save() {
  localStorage.setItem(BACKUP_KEY, JSON.stringify(schools));
  try {
    await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "save", content: schools }) });
    document.getElementById('syncStatus').innerText = "✅ Sincronizado";
  } catch(e) { document.getElementById('syncStatus').innerText = "⚠️ Offline"; }
}

function manualSave() { save(); alert("✔️ Dados salvos na nuvem!"); }

async function load() {
  try {
    const response = await fetch(WEB_APP_URL);
    const data = await response.json();
    if (Array.isArray(data)) schools = data;
  } catch(e) {
    const d = localStorage.getItem(BACKUP_KEY);
    if (d) schools = JSON.parse(d);
  }
  render();
}

function addSchool() {
  const n = document.getElementById('schoolInput').value;
  if (!n.trim()) return;
  schools.push({ name: n.trim(), classes: [] });
  document.getElementById('schoolInput').value = '';
  render(); save();
}

function addClass(s) {
  const n = prompt('Nome da turma:');
  if (n) { schools[s].classes.push({ name: n, students: [], subjects: [], notes: {}, month: new Date().getMonth(), year: 2026 }); render(); save(); }
}

function addStudents(s, c) {
  const input = prompt('Lista de alunos:');
  if (input) {
    input.split(/\n/).forEach(n => { if(n.trim()) schools[s].classes[c].students.push({ name: n.trim(), absences: {}, grades: {}, transferido: false }); });
    render(); save();
  }
}

function addSubject(s, c) {
  const n = prompt('Disciplina:');
  if (n) { schools[s].classes[c].subjects.push(n); render(); save(); }
}

// FUNÇÃO UNIFICADA: EDITAR OU TRANSFERIR
function menuAluno(s, c, i) {
    const aluno = schools[s].classes[c].students[i];
    const opcao = prompt(`Aluno: ${aluno.name}\n\nDigite:\n1 - Editar Nome\n2 - ${aluno.transferido ? "Reativar Aluno" : "Marcar Transferido"}\n3 - Cancelar`);
    
    if (opcao === "1") {
        const novoNome = prompt("Novo nome:", aluno.name);
        if (novoNome) aluno.name = novoNome.trim();
    } else if (opcao === "2") {
        aluno.transferido = !aluno.transferido;
    } else {
        return;
    }
    render(); save();
}

function openModal(s, c, d) {
  currentNote = { s, c, d };
  document.getElementById('noteText').value = schools[s].classes[c].notes[d]?.text || '';
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function saveNote() {
  const { s, c, d } = currentNote;
  if(!schools[s].classes[c].notes) schools[s].classes[c].notes = {};
  schools[s].classes[c].notes[d] = { text: document.getElementById('noteText').value };
  closeModal(); render(); save();
}

function exportFullReport(s, c) {
  const school = schools[s];
  const cls = school.classes[c];
  let html = `<html><head><title>Relatório</title><style>table{width:100%;border-collapse:collapse;}th,td{border:1px solid #000;padding:5px;text-align:center;}</style></head><body>`;
  html += `<h2>${school.name} - Turma: ${cls.name}</h2><table><thead><tr><th>Nº</th><th>Aluno</th><th>Faltas</th></tr></thead><tbody>`;
  cls.students.forEach((st, i) => {
      let tf = st.absences[cls.month] ? Object.values(st.absences[cls.month]).filter(v => v).length : 0;
      html += `<tr style="${st.transferido?'color:gray;text-decoration:line-through':''}"><td>${i+1}</td><td>${st.name} ${st.transferido?'(TR)':''}</td><td>${tf}</td></tr>`;
  });
  html += `</tbody></table><br><h4>Resumos:</h4>`;
  Object.keys(cls.notes || {}).forEach(d => html += `<p><b>Dia ${d}:</b> ${cls.notes[d].text}</p>`);
  html += `<button onclick="window.print()">Imprimir</button></body></html>`;
  const w = window.open(); w.document.write(html); w.document.close();
}

function toggleAbsence(s, c, i, d) {
  const cls = schools[s].classes[c];
  if(!cls.students[i].absences[cls.month]) cls.students[i].absences[cls.month] = {};
  cls.students[i].absences[cls.month][d] = !cls.students[i].absences[cls.month][d];
  render(); save();
}

function getDays(m, y) { return new Date(y, m + 1, 0).getDate(); }

function render() {
  const div = document.getElementById('schools');
  div.innerHTML = '';
  schools.forEach((school, s) => {
    const sKey = `school-${s}`;
    let sHtml = `<div class='section'>
      <div style="cursor:pointer; display:flex; justify-content:space-between;" onclick="openState['${sKey}']=!openState['${sKey}'];render()">
        <b>🏫 ${school.name}</b> <span>${openState[sKey]?'🔽':'▶️'}</span>
      </div>`;
    
    if(openState[sKey]) {
      sHtml += `<button onclick="addClass(${s})">➕ Turma</button>`;
      school.classes.forEach((cls, c) => {
        const cKey = `${s}-${c}`;
        sHtml += `<div style="margin-top:10px; background:rgba(255,255,255,0.1); padding:10px; border-radius:8px;">
          <div style="cursor:pointer; display:flex; justify-content:space-between;" onclick="openState['${cKey}']=!openState['${cKey}'];render()">
            <span>📚 ${cls.name}</span> <span>${openState[cKey]?'🔽':'▶️'}</span>
          </div>`;
        
        if(openState[cKey]) {
          sHtml += `<div style="margin-top:10px">
                    <button onclick="addSubject(${s},${c})" style="background:#8b5cf6">➕ Disciplina</button>
                    <button onclick="addStudents(${s},${c})" style="background:#0ea5e9">👥 Alunos</button>
                    <button onclick="exportFullReport(${s},${c})" style="background:#f59e0b">📊 Imprimir</button>
                    <select class="select-estilizado" onchange="schools[${s}].classes[${c}].month=Number(this.value);render();save();">`;
          ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"].forEach((m, idx) => sHtml += `<option value="${idx}" ${idx==cls.month?'selected':''}>${m}</option>`);
          sHtml += `</select></div>`;

          const days = getDays(cls.month, cls.year);
          sHtml += `<div class='table-container'><table><thead><tr>
            <th rowspan="2">Nº</th><th rowspan="2">Alunos (Clique p/ editar)</th><th colspan="${days}">Chamada (Clique no dia p/ Resumo)</th><th colspan="${cls.subjects.length||1}">Notas</th>
            </tr><tr>`;
          for(let d=1; d<=days; d++) sHtml += `<th onclick="openModal(${s},${c},${d})"><span class="day-btn ${cls.notes?.[d]?'has-note':''}">${d}</span></th>`;
          cls.subjects.forEach(sub => sHtml += `<th>${sub}</th>`);
          sHtml += `</tr></thead><tbody>`;
          
          cls.students.forEach((st, i) => {
            sHtml += `<tr class="${st.transferido?'transferido':''}">
              <td style="background:#f1f5f9; font-weight:bold;">${i+1}</td>
              <td onclick="menuAluno(${s},${c},${i})" style="cursor:pointer"><b>${st.name}</b> ${st.transferido?'(TR)':''}</td>`;
            for(let d=1; d<=days; d++) {
              const f = st.absences[cls.month]?.[d];
              sHtml += `<td onclick="toggleAbsence(${s},${c},${i},${d})" style="color:${f?'red':''}; font-weight:${f?'bold':''}">${f?'F':''}</td>`;
            }
            cls.subjects.forEach(sub => sHtml += `<td><input style="width:40px;text-align:center;" value="${st.grades[sub]||''}" onchange="schools[${s}].classes[${c}].students[${i}].grades['${sub}']=this.value;save()"></td>`);
            sHtml += `</tr>`;
          });
          sHtml += `</tbody></table></div>`;
        }
        sHtml += `</div>`;
      });
    }
    div.innerHTML += sHtml + `</div>`;
  });
}
load();
</script>
</body>
</html>
