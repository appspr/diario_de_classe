<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pauta Ágil - Gestão Escolar Completa</title>

<style>
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  padding: 10px;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: #fff;
  margin: 0;
  min-height: 100vh;
}

h1 { text-align: center; font-size: 1.8em; margin: 15px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

.section {
  background: rgba(255, 255, 255, .08);
  border-radius: 16px;
  margin-bottom: 15px;
  padding: 15px;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

/* --- COLUNA FIXA PARA CELULAR --- */
.table-container {
  overflow-x: auto;
  margin-top: 15px;
  border-radius: 12px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

table {
  border-collapse: separate;
  border-spacing: 0;
  width: 100%;
  background: #fff;
  color: #000;
}

th, td {
  border-right: 1px solid #e2e8f0;
  border-bottom: 1px solid #e2e8f0;
  padding: 10px 8px;
  text-align: center;
  white-space: nowrap;
}

/* Nº e Nome fixos na esquerda */
th:nth-child(1), td:nth-child(1) {
  position: sticky; left: 0; z-index: 10;
  background: #f1f5f9; min-width: 35px;
}
th:nth-child(2), td:nth-child(2) {
  position: sticky; left: 44px; z-index: 10;
  background: #fff; text-align: left; min-width: 150px;
  border-right: 2px solid #1e40af;
}
th:nth-child(1), th:nth-child(2) {
  background: #1e40af !important; color: white; z-index: 11;
}

/* --- BOTÕES E COMPONENTES --- */
button {
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  margin: 4px;
  transition: 0.2s;
}
button:hover { background: #2563eb; transform: translateY(-2px); }

.school-header, .header {
  padding: 15px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(37, 99, 235, 0.3);
  margin-bottom: 5px;
}

.day-btn {
  display: inline-block;
  background: rgba(0,0,0,0.05);
  border-radius: 6px;
  padding: 4px 8px;
  font-weight: bold;
  cursor: pointer;
}
.day-btn.has-note { background: #10b981; color: #fff; border: 1px solid #059669; }

.modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, .7);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.modal-content {
  background: #fff; color: #000; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px;
}
</style>
</head>

<body>

<h1>🚀 Pauta Ágil</h1>

<div style="text-align: center; margin-bottom: 10px;">
  <input id="schoolInput" placeholder="🏫 Nome da Escola" style="padding: 10px; border-radius: 8px; border: none; width: 200px;">
  <button onclick="addSchool()">➕ Escola</button>
  <button onclick="manualSave()" style="background: #10b981;">☁️ Sincronizar</button>
  <div id="syncStatus" style="font-size: 12px; margin-top: 5px; font-weight: bold;"></div>
</div>

<div id="schools"></div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin-top:0; color:#1e40af;">📝 Resumo da Aula</h3>
    <p id="modalDate" style="font-size:12px; color:#64748b; margin-top:-10px;"></p>
    <textarea id="noteText" placeholder="O que foi ensinado hoje?" style="width: 100%; height: 120px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; padding:10px; font-family:inherit;"></textarea>
    <div style="display:flex; gap:10px;">
        <button onclick="closeModal()" style="background:#ef4444; flex:1;">Cancelar</button>
        <button onclick="saveNote()" style="background:#10b981; flex:1;">Salvar Registro</button>
    </div>
  </div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxNzAf7pMLME8f_uDNBRIznFnxvOqHSiOgGbOYKMMDdZ7M662iFP5Iq4QalJSsJG19IdA/exec';
const BACKUP_KEY = 'diario_pro_backup';

let schools = [];
let openState = {};
let currentNote = {};

async function save() {
  localStorage.setItem(BACKUP_KEY, JSON.stringify(schools));
  try {
    await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "save", content: schools }) });
    document.getElementById('syncStatus').innerText = "✅ Sincronizado";
    document.getElementById('syncStatus').style.color = "#10b981";
  } catch(e) { 
    document.getElementById('syncStatus').innerText = "⚠️ Offline"; 
    document.getElementById('syncStatus').style.color = "#f59e0b";
  }
}

function manualSave() { save(); alert("✔️ Dados salvos na nuvem!"); }

async function load() {
  try {
    const response = await fetch(WEB_APP_URL);
    const data = await response.json();
    if (Array.isArray(data)) schools = data;
  } catch(e) {
    const d = localStorage.getItem(BACKUP_KEY);
    if (d) schools = JSON.parse(d);
  }
  render();
}

function addSchool() {
  const n = document.getElementById('schoolInput').value;
  if (!n.trim()) return;
  schools.push({ name: n.trim(), classes: [] });
  document.getElementById('schoolInput').value = '';
  render(); save();
}

function addClass(s) {
  const n = prompt('Nome da turma:');
  if (n) { 
    schools[s].classes.push({ name: n, students: [], subjects: [], notes: {}, month: new Date().getMonth(), year: 2026 }); 
    render(); save(); 
  }
}

function addStudents(s, c) {
  const input = prompt('Cole a lista de alunos (um por linha):');
  if (input) {
    input.split(/\n/).forEach(n => { if(n.trim()) schools[s].classes[c].students.push({ name: n.trim(), absences: {}, grades: {} }); });
    render(); save();
  }
}

function addSubject(s, c) {
  const n = prompt('Nome da Disciplina:');
  if (n) { schools[s].classes[c].subjects.push(n); render(); save(); }
}

function openModal(s, c, d) {
  currentNote = { s, c, d };
  const cls = schools[s].classes[c];
  document.getElementById('modalDate').innerText = `Dia ${d} - Turma: ${cls.name}`;
  document.getElementById('noteText').value = cls.notes[d]?.text || '';
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function saveNote() {
  const { s, c, d } = currentNote;
  if(!schools[s].classes[c].notes) schools[s].classes[c].notes = {};
  schools[s].classes[c].notes[d] = { text: document.getElementById('noteText').value };
  closeModal(); render(); save();
}

function exportFullReport(s, c) {
  const school = schools[s];
  const cls = school.classes[c];
  const m = cls.month;
  let html = `<html><head><title>Relatório - ${cls.name}</title><style>
    body { font-family: sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #f0f0f0; }
    .notes-sec { margin-top: 30px; border-top: 2px solid #333; padding-top: 10px; }
  </style></head><body>
  <h2>${school.name}</h2><h3>Turma: ${cls.name} - Mês: ${m+1}/2026</h3>
  <table><thead><tr><th>Nº</th><th style="text-align:left">Aluno</th><th>Faltas</th>${cls.subjects.map(sub => `<th>${sub}</th>`).join('')}</tr></thead><tbody>`;
  cls.students.forEach((st, i) => {
    let tf = st.absences[m] ? Object.values(st.absences[m]).filter(v => v).length : 0;
    html += `<tr><td>${i+1}</td><td style="text-align:left">${st.name}</td><td>${tf}</td>${cls.subjects.map(sub => `<td>${st.grades[sub] || '-'}</td>`).join('')}</tr>`;
  });
  html += `</tbody></table><div class="notes-sec"><h4>Resumos das Aulas:</h4>`;
  Object.keys(cls.notes || {}).sort((a,b)=>a-b).forEach(day => {
      html += `<p><b>Dia ${day}:</b> ${cls.notes[day].text}</p>`;
  });
  html += `</div><br><button onclick="window.print()">Imprimir</button></body></html>`;
  const w = window.open('', '_blank'); w.document.write(html); w.document.close();
}

function toggleAbsence(s, c, i, d) {
  const cls = schools[s].classes[c];
  if(!cls.students[i].absences[cls.month]) cls.students[i].absences[cls.month] = {};
  cls.students[i].absences[cls.month][d] = !cls.students[i].absences[cls.month][d];
  render(); save();
}

function getDays(m, y) { return new Date(y, m + 1, 0).getDate(); }

function render() {
  const div = document.getElementById('schools');
  div.innerHTML = '';
  schools.forEach((school, s) => {
    const sKey = `school-${s}`;
    let sHtml = `<div class='section'>
      <div class='school-header' onclick="openState['${sKey}']=!openState['${sKey}'];render()">
        <b>🏫 ${school.name}</b> <span>${openState[sKey]?'🔽':'▶️'}</span>
      </div>`;
    
    if(openState[sKey]) {
      sHtml += `<button onclick="addClass(${s})">➕ Turma</button>`;
      school.classes.forEach((cls, c) => {
        const cKey = `${s}-${c}`;
        sHtml += `<div class='header' style="margin-top:10px" onclick="openState['${cKey}']=!openState['${cKey}'];render()">
          <span>📚 ${cls.name}</span> <span>${openState[cKey]?'🔽':'▶️'}</span>
        </div>`;
        
        if(openState[cKey]) {
          sHtml += `<div style="margin-top:10px">
            <button onclick="addSubject(${s},${c})" style="background:#8b5cf6">➕ Disciplina</button>
            <button onclick="addStudents(${s},${c})" style="background:#0ea5e9">👥 Alunos</button>
            <button onclick="exportFullReport(${s},${c})" style="background:#f59e0b">📊 Imprimir</button>
            <select onchange="schools[${s}].classes[${c}].month=Number(this.value);render();save();" style="padding:8px; border-radius:10px;">`;
            const meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
            meses.forEach((m, idx) => sHtml += `<option value="${idx}" ${idx==cls.month?'selected':''}>${m}</option>`);
          sHtml += `</select></div>`;

          const days = getDays(cls.month, cls.year);
          sHtml += `<div class='table-container'><table><thead><tr>
            <th rowspan="2">Nº</th><th rowspan="2">Alunos</th><th colspan="${days}">Frequência (Clique no dia para o Resumo)</th><th colspan="${cls.subjects.length||1}">Notas</th>
            </tr><tr>`;
          for(let d=1; d<=days; d++) {
              const hasN = cls.notes && cls.notes[d] && cls.notes[d].text !== '' ? 'has-note' : '';
              sHtml += `<th onclick="openModal(${s},${c},${d})"><span class="day-btn ${hasN}">${d}</span></th>`;
          }
          cls.subjects.forEach(sub => sHtml += `<th>${sub}</th>`);
          if(cls.subjects.length==0) sHtml += `<th>-</th>`;
          sHtml += `</tr></thead><tbody>`;
          
          cls.students.forEach((st, i) => {
            sHtml += `<tr><td style="background:#f1f5f9; font-weight:bold;">${i+1}</td><td><b>${st.name}</b></td>`;
            for(let d=1; d<=days; d++) {
              const f = st.absences[cls.month]?.[d];
              sHtml += `<td onclick="toggleAbsence(${s},${c},${i},${d})" style="color:${f?'red':''}; font-weight:${f?'bold':''}">${f?'F':''}</td>`;
            }
            cls.subjects.forEach(sub => sHtml += `<td><input style="width:40px;text-align:center;border:1px solid #ccc;" value="${st.grades[sub]||''}" onchange="schools[${s}].classes[${c}].students[${i}].grades['${sub}']=this.value;save()"></td>`);
            if(cls.subjects.length==0) sHtml += `<td>-</td>`;
            sHtml += `</tr>`;
          });
          sHtml += `</tbody></table></div>`;
        }
      });
    }
    div.innerHTML += sHtml + `</div>`;
  });
}
load();
</script>
</body>
</html>
