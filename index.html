<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Diário de Classe</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; background: linear-gradient(135deg, #0f172a, #1e3a8a); color: #fff; margin: 0; min-height: 100vh; }
        .section { background: rgba(255, 255, 255, .08); border-radius: 16px; margin-bottom: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .table-container { overflow-x: auto; margin-top: 15px; border-radius: 12px; background: #fff; position: relative; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; background: #fff; color: #000; }
        th, td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 10px; text-align: center; white-space: nowrap; }
        th { background: #1e40af; color: #fff; font-size: 11px; }
        .fixed-name { position: sticky; left: 0; background: #fff; text-align: left; min-width: 180px; border-right: 3px solid #1e40af !important; z-index: 10; }
        .day-btn { display: inline-flex; align-items: center; justify-content: center; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-weight: bold; color: #1e40af; }
        .day-btn.has-note { background: #10b981 !important; color: #fff !important; }
        button, select { padding: 10px 15px; border-radius: 10px; border: none; background: #3b82f6; color: #fff; font-weight: bold; cursor: pointer; margin: 4px; }
        .falta-marcada { color: red !important; font-weight: bold; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, .7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; color: #000; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <h1 style="text-align:center">🚀 Meu Diário de Classe</h1>

    <div style="text-align: center; margin-bottom: 10px;">
        <button onclick="load()" style="background: #8b5cf6;">🔄 Atualizar Dados</button>
        <button onclick="save()" style="background: #10b981;">☁️ Sincronizar Agora</button>
        <div id="syncStatus" style="font-size: 12px; margin-top: 5px;"></div>
    </div>

    <div id="schools"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="color:#1e40af; margin-top:0;">📝 Resumo da Aula</h3>
            <textarea id="noteText" style="width: 100%; height: 120px; border-radius: 8px; padding: 10px; border: 1px solid #ccc; font-family: sans-serif;"></textarea>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="closeModal()" style="background:#ef4444; flex:1;">Cancelar</button>
                <button onclick="saveNote()" style="background:#10b981; flex:1;">Salvar Registro</button>
            </div>
        </div>
    </div>

    <script>
        // Use o SEU link do Google Apps Script aqui:
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxNzAf7pMLME8f_uDNBRIznFnxvOqHSiOgGbOYKMMDdZ7M662iFP5Iq4QalJSsJG19IdA/exec'; 
        const BACKUP_KEY = 'diario_pro_backup';

        let schools = [];
        let openState = {};
        let currentPos = {};

        async function load() {
            const status = document.getElementById('syncStatus');
            status.innerText = "⏳ Conectando...";
            try {
                const r = await fetch(WEB_APP_URL);
                const data = await r.json();
                if (Array.isArray(data)) {
                    schools = data;
                    localStorage.setItem(BACKUP_KEY, JSON.stringify(schools));
                    status.innerText = "✅ Sincronizado";
                }
            } catch(e) {
                const local = localStorage.getItem(BACKUP_KEY);
                if (local) schools = JSON.parse(local);
                status.innerText = "⚠️ Modo Offline";
            }
            render();
        }

        function render() {
            const div = document.getElementById('schools');
            div.innerHTML = '';
            const mesAtual = new Date().getMonth();

            schools.forEach((s, sIdx) => {
                let sHtml = `<div class="section">
                    <h3 onclick="openState['s${sIdx}']=!openState['s${sIdx}'];render()" style="cursor:pointer">🏫 ${s.name}</h3>`;
                
                if (openState[`s${sIdx}`]) {
                    (s.classes || []).forEach((c, cIdx) => {
                        if (c.month === undefined) c.month = mesAtual;
                        const diasNoMes = new Date(2026, c.month + 1, 0).getDate();
                        const mesNome = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][c.month];

                        sHtml += `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; margin-top:10px;">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                                <b>📚 ${c.name}</b>
                                <select onchange="schools[${sIdx}].classes[${cIdx}].month=Number(this.value);render();">
                                    ${["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"].map((m, i) => `<option value="${i}" ${i==c.month?'selected':''}>${m}</option>`).join('')}
                                </select>
                            </div>
                            <button onclick="exportReport(${sIdx},${cIdx})" style="background:#f59e0b; font-size:11px;">📊 Imprimir ${mesNome}</button>
                            
                            <div class="table-container">
                                <table>
                                    <thead>
                                        <tr><th class="fixed-name">Alunos</th>`;
                                        for(let d=1; d<=diasNoMes; d++) {
                                            // CHAVE ÚNICA POR MÊS: m4_d27 (Maio), m3_d27 (Abril)
                                            const key = `m${c.month}_d${d}`;
                                            const temNota = c.notes && c.notes[key];
                                            sHtml += `<th><span onclick="openNote(${sIdx},${cIdx},${d})" class="day-btn ${temNota?'has-note':''}">${d}</span></th>`;
                                        }
                        sHtml += `</tr></thead><tbody>`;
                        
                        (c.students || []).forEach((st, iIdx) => {
                            sHtml += `<tr><td class="fixed-name"><b>${st.name}</b></td>`;
                            for(let d=1; d<=diasNoMes; d++) {
                                let f = st.absences && st.absences[c.month] && st.absences[c.month][d];
                                sHtml += `<td ondblclick="toggleF(${sIdx},${cIdx},${iIdx},${d},this)" class="${f?'falta-marcada':''}">${f?'F':''}</td>`;
                            }
                            sHtml += `</tr>`;
                        });
                        sHtml += `</tbody></table></div></div>`;
                    });
                }
                div.innerHTML += sHtml + `</div>`;
            });
        }

        function openNote(s, c, d) {
            currentPos = { s, c, d };
            const cls = schools[s].classes[c];
            const key = `m${cls.month}_d${d}`;
            document.getElementById('noteText').value = (cls.notes && cls.notes[key]) ? cls.notes[key].text : "";
            document.getElementById('modal').style.display = 'flex';
        }

        function saveNote() {
            const { s, c, d } = currentPos;
            const cls = schools[s].classes[c];
            if (!cls.notes) cls.notes = {};
            const key = `m${cls.month}_d${d}`;
            const txt = document.getElementById('noteText').value.trim();
            if (txt === "") delete cls.notes[key];
            else cls.notes[key] = { text: txt };
            closeModal(); render(); save();
        }

        function toggleF(s, c, i, d, el) {
            const cls = schools[s].classes[c];
            const st = cls.students[i];
            const m = cls.month;
            if(!st.absences) st.absences = {};
            if(!st.absences[m]) st.absences[m] = {};
            st.absences[m][d] = !st.absences[m][d];
            el.innerText = st.absences[m][d] ? "F" : "";
            el.className = st.absences[m][d] ? "falta-marcada" : "";
            save();
        }

        async function save() {
            localStorage.setItem(BACKUP_KEY, JSON.stringify(schools));
            try {
                await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "save", content: schools }) });
            } catch(e) {}
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function exportReport(sIdx, cIdx) {
            const s = schools[sIdx];
            const c = s.classes[cIdx];
            const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
            let html = `<html><head><title>Relatório</title><style>body{font-family:sans-serif;padding:20px;} table{width:100%;border-collapse:collapse;margin-top:10px;} th,td{border:1px solid #ccc;padding:8px;text-align:center;} .btn{background:#1e40af;color:white;padding:12px;border:none;border-radius:8px;cursor:pointer;margin-bottom:20px;font-weight:bold;}</style></head><body>
            <button class="btn" onclick="window.close()">← VOLTAR AO DIÁRIO</button>
            <h2>${s.name} - ${c.name}</h2>
            <h3>Mês: ${meses[c.month]}</h3>
            <table><thead><tr><th>Nº</th><th>Aluno</th><th>Faltas</th></tr></thead><tbody>`;
            c.students.forEach((st, i) => {
                let fCount = 0; if(st.absences && st.absences[c.month]) Object.values(st.absences[c.month]).forEach(v => {if(v) fCount++});
                html += `<tr><td>${i+1}</td><td style="text-align:left">${st.name}</td><td>${fCount}</td></tr>`;
            });
            html += `</tbody></table><h4>📝 Registros de ${meses[c.month]}:</h4>`;
            for(let d=1; d<=31; d++) {
                const key = `m${c.month}_d${d}`;
                if(c.notes && c.notes[key]) html += `<p><b>Dia ${d}:</b> ${c.notes[key].text}</p>`;
            }
            html += `</body></html>`;
            const win = window.open(); win.document.write(html); win.document.close();
        }
        load();
    </script>
</body>
</html>
